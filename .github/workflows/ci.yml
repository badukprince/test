name: CI-CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"

permissions:
  contents: read

env:
  # Opt in early to Node.js 24 runtime for JS-based actions.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci-verify:
    name: CI Verify
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify local Python
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install httpx

      - name: Static sanity check (compile)
        run: python -m compileall .

      - name: API smoke test
        run: python -c "from fastapi.testclient import TestClient; from main import app; c=TestClient(app); h=c.get('/health'); assert h.status_code==200, h.text; assert h.json().get('status')=='ok', h.text; p={'fen':'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1'}; r=c.post('/analyze/fen', json=p); assert r.status_code==200, r.text; b=r.json(); assert all(k in b for k in ['score','advantage','reasoning','source']), b; print('Smoke checks passed')"

      - name: Docker build check
        run: docker build -t chess-analyzer-api:ci .

  docker-publish:
    name: Docker Publish
    runs-on: [self-hosted, Windows, X64]
    needs: ci-verify
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/chess-analyzer-api
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy-local:
    name: Deploy On Local Host
    runs-on: [self-hosted, Windows, X64]
    needs: docker-publish
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/chess-analyzer-api:latest
      CONTAINER_NAME: chess-analyzer
      APP_PORT: "8000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker login
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull latest image
        run: docker pull $env:IMAGE_NAME

      - name: Stop and remove existing container
        shell: pwsh
        run: |
          $id = docker ps -aq -f "name=^$($env:CONTAINER_NAME)$"
          if ($id) {
            docker stop $env:CONTAINER_NAME
            docker rm $env:CONTAINER_NAME
          } else {
            Write-Host "No existing container found: $env:CONTAINER_NAME"
          }

      - name: Run updated container
        run: |
          docker run -d `
            --name $env:CONTAINER_NAME `
            -p "$($env:APP_PORT):8000" `
            --restart unless-stopped `
            $env:IMAGE_NAME

      - name: Health check
        shell: pwsh
        run: |
          Start-Sleep -Seconds 5
          $res = Invoke-RestMethod -Uri "http://127.0.0.1:$($env:APP_PORT)/health" -Method Get
          if ($res.status -ne "ok") { throw "Health check failed" }
          Write-Host "Local deploy healthy: $($res.status)"
