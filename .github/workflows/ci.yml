name: CI-CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - develop
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci-verify:
    name: CI Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install httpx

      - name: Static sanity check (compile)
        run: python -m compileall .

      - name: API smoke test
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from main import app

          client = TestClient(app)
          h = client.get("/health")
          assert h.status_code == 200, h.text
          assert h.json().get("status") == "ok", h.text

          fen_payload = {
              "fen": "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"
          }
          r = client.post("/analyze/fen", json=fen_payload)
          assert r.status_code == 200, r.text
          body = r.json()
          for key in ["score", "advantage", "reasoning", "source"]:
              assert key in body, body
          print("Smoke checks passed")
          PY

      - name: Docker build check
        run: docker build -t chess-analyzer-api:ci .

  docker-publish:
    name: Docker Publish
    runs-on: ubuntu-latest
    needs: ci-verify
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/chess-analyzer-api
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
